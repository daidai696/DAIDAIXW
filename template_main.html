<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻速递 — {{DATE}}</title>
    <style>
        :root {
            --bg: #f6f5f3;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8c8c8c;
            --border: #e6e3dd;
            --accent-tech: #2563eb;
            --accent-economy: #d97706;
            --accent-politics: #dc2626;
            --accent-humanities: #7c3aed;
            --accent-military: #0f766e;
            --summary-bg: #1e1b18;
            --tag-bg: #f0eeea;
            --tag-text: #5c554d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

        .masthead {
            text-align: center;
            padding: 40px 20px 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }
        .masthead h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--text);
        }
        .masthead .date {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 12px;
        }
        .masthead .divider {
            display: inline-block;
            width: 50px;
            height: 3px;
            background: var(--text);
            margin: 12px 0 0;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .tab {
            flex-shrink: 0;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s ease;
            color: var(--text-secondary);
            letter-spacing: .5px;
        }
        .tab:hover { border-color: #bbb; }
        .tab.active {
            color: #fff;
            border-color: transparent;
        }
        .tab.active.tech    { background: var(--accent-tech); }
        .tab.active.economy  { background: var(--accent-economy); }
        .tab.active.politics { background: var(--accent-politics); }
        .tab.active.humanities { background: var(--accent-humanities); }
        .tab.active.military { background: var(--accent-military); }

        .tab .tab-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .dot-tech    { background: var(--accent-tech); }
        .dot-economy  { background: var(--accent-economy); }
        .dot-politics { background: var(--accent-politics); }
        .dot-humanities { background: var(--accent-humanities); }
        .dot-military { background: var(--accent-military); }

        .tab.active .tab-dot { background: rgba(255,255,255,.5); }

        .tab .tab-count {
            margin-left: 4px;
            font-size: 11px;
            opacity: .6;
        }

        .panel {
            display: none;
            animation: fadeIn .3s ease;
        }
        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .news-card {
            background: var(--card);
            border-radius: 10px;
            padding: 22px 24px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .2s ease;
        }
        .news-card:hover {
            border-color: #bbb;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
            transform: translateX(3px);
        }

        .news-card-title {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 6px;
        }
        .news-card-source {
            display: inline-block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }
        .news-card-source::before { content: '来源：'; }

        .news-card-overview {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 14px;
            padding: 12px 16px;
            background: #faf9f7;
            border-radius: 6px;
            border-left: 3px solid var(--text-muted);
        }

        .detail-list { display: flex; flex-direction: column; gap: 8px; }
        .detail-item {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            padding-left: 16px;
            border-left: 2px solid var(--border);
        }
        .detail-item .dlbl {
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            margin-right: 6px;
            display: inline-block;
            min-width: fit-content;
        }
        .category-tech .dlbl    { color: var(--accent-tech); }
        .category-economy .dlbl  { color: var(--accent-economy); }
        .category-politics .dlbl { color: var(--accent-politics); }
        .category-humanities .dlbl { color: var(--accent-humanities); }
        .category-military .dlbl { color: var(--accent-military); }

        .summary-section {
            margin-top: 40px;
            background: var(--summary-bg);
            border-radius: 12px;
            padding: 32px 36px;
            color: #dcd6cc;
        }
        .summary-section h2 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-section h2::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 20px;
            background: #dba959;
            border-radius: 2px;
        }
        .summary-body p {
            font-size: 14px;
            line-height: 2;
            color: #bfb5a6;
            margin-bottom: 16px;
        }
        .summary-body p:last-child {
            margin-bottom: 0;
            color: #dba959;
            font-style: italic;
        }

        .footer {
            text-align: center;
            margin-top: 36px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: .5px;
        }

        .empty-notice {
            color: #aaa;
            padding: 20px 24px;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .masthead h1 { font-size: 24px; letter-spacing: 3px; }
            .news-card { padding: 18px 16px; }
            .tab { padding: 8px 14px; font-size: 13px; }
            .summary-section { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="masthead">
            <h1>每日新闻速递</h1>
            <div class="divider"></div>
            <div class="date">{{DATE}}</div>
        </div>

        {{FALLBACK_NOTICE}}

        <div class="tabs">
            <button class="tab tech active" data-panel="tech">
                <span class="tab-dot dot-tech"></span>科技<span class="tab-count">{{TECH_COUNT}}条</span>
            </button>
            <button class="tab economy" data-panel="economy">
                <span class="tab-dot dot-economy"></span>经济<span class="tab-count">{{ECONOMY_COUNT}}条</span>
            </button>
            <button class="tab politics" data-panel="politics">
                <span class="tab-dot dot-politics"></span>政治<span class="tab-count">{{POLITICS_COUNT}}条</span>
            </button>
            <button class="tab humanities" data-panel="humanities">
                <span class="tab-dot dot-humanities"></span>人文<span class="tab-count">{{HUMANITIES_COUNT}}条</span>
            </button>
            <button class="tab military" data-panel="military">
                <span class="tab-dot dot-military"></span>军事<span class="tab-count">{{MILITARY_COUNT}}条</span>
            </button>
        </div>

        <div class="panel category-tech active" id="panel-tech">
            {{NEWS_TECH}}
        </div>
        <div class="panel category-economy" id="panel-economy">
            {{NEWS_ECONOMY}}
        </div>
        <div class="panel category-politics" id="panel-politics">
            {{NEWS_POLITICS}}
        </div>
        <div class="panel category-humanities" id="panel-humanities">
            {{NEWS_HUMANITIES}}
        </div>
        <div class="panel category-military" id="panel-military">
            {{NEWS_MILITARY}}
        </div>

        <div class="summary-section">
            <h2>今日总结与启示</h2>
            <div class="summary-body">
                {{SUMMARY}}
            </div>
        </div>

        <div class="footer">
            每日早 10 点自动更新 &nbsp;·&nbsp; 信息来源：主流新闻媒体 &nbsp;·&nbsp; 仅供参考
        </div>
    </div>

    <script>
        (function () {
            var tabs = document.querySelectorAll('.tab');
            var panels = document.querySelectorAll('.panel');

            function switchTab(tab) {
                var panel = tab.getAttribute('data-panel');
                tabs.forEach(function (x) { x.classList.remove('active'); });
                panels.forEach(function (x) { x.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('panel-' + panel).classList.add('active');
            }

            tabs.forEach(function (t) {
                t.addEventListener('click', function () { switchTab(this); });
            });

            var activeTab = document.querySelector('.tab.active');
            var activePanel = document.querySelector('.panel.active');
            if (activePanel && activePanel.textContent.trim() === '暂无新闻') {
                for (var i = 0; i < tabs.length; i++) {
                    var pid = tabs[i].getAttribute('data-panel');
                    var panelEl = document.getElementById('panel-' + pid);
                    if (panelEl && panelEl.textContent.trim() !== '暂无新闻') {
                        switchTab(tabs[i]);
                        break;
                    }
                }
            }
        })();
    </script>
</body>
</html>
