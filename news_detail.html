<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 — 每日新闻速递</title>
    <style>
        :root {
            --bg: #f4f2ef;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #888;
            --border: #e8e4df;
            --summary-bg: #1e1b18;
            --tag-bg: #f0ede9;
            --tag-text: #5c554d;
            --accent: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 768px; margin: 0 auto; padding: 32px 20px 60px; }

        .back-row {
            margin-bottom: 24px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color .2s ease;
        }
        .back-link:hover { color: var(--text); }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 36px 32px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
            margin-bottom: 24px;
        }
        .card .title {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 16px;
        }
        .card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .card .meta span {
            font-size: 13px;
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 4px 12px;
            border-radius: 4px;
        }
        .card .meta .source { font-weight: 600; }

        .detail-block {
            margin-bottom: 16px;
        }
        .detail-block .label {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-block .label::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
        }
        .detail-block .content {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.75;
            padding-left: 11px;
        }

        .original-link {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .original-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .original-link a:hover { text-decoration: underline; }

        .insight-card {
            background: var(--summary-bg);
            border-radius: 12px;
            padding: 28px 30px;
            color: #e0dbd4;
            margin-bottom: 24px;
        }
        .insight-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: #dba959;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .insight-card p {
            font-size: 14px;
            line-height: 1.85;
            color: #c4bbb0;
        }

        .related-card {
            background: var(--card);
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
        }
        .related-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .related-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all .2s ease;
        }
        .related-item:last-child { border-bottom: none; }
        .related-item:hover { color: var(--accent); padding-left: 6px; }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .card { padding: 24px 20px; }
            .card .title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-row">
            <a href="daily_news.html" class="back-link">← 返回新闻列表</a>
        </div>

        <div class="card">
            <h1 class="title" id="detail-title">加载中...</h1>
            <div class="meta" id="detail-meta"></div>
            <div id="detail-content"></div>
            <div class="original-link" id="detail-link"></div>
        </div>

        <div class="insight-card">
            <h3>新闻启示</h3>
            <p id="detail-insight"></p>
        </div>

        <div class="related-card">
            <h3>同类新闻</h3>
            <div id="related-list"></div>
        </div>

        <div class="footer">
            <p>每日新闻速递 &nbsp;·&nbsp; 数据来源：主流新闻媒体</p>
        </div>
    </div>

    <script>
        var newsData = {
            // {{NEWS_DATA_PLACEHOLDER}}
            0: {title: '示例', source: '来源', url: '#', cat: 'tech',
                 details: [{label:'核心内容',content:'示例内容'}],
                 insight: '示例洞察'}
        };

        var catNames = {
            tech: '科技', economy: '经济', politics: '政治',
            humanities: '人文', military: '军事'
        };

        function getNewsId() {
            var p = new URLSearchParams(window.location.search);
            var id = p.get('n') || p.get('news');
            return id ? parseInt(id) : 1;
        }

        function render() {
            var id = getNewsId();
            var news = newsData[id];
            if (!news) {
                document.getElementById('detail-title').textContent = '新闻未找到';
                return;
            }

            document.getElementById('detail-title').textContent = news.title;
            document.getElementById('detail-meta').innerHTML =
                '<span class="source">' + news.source + '</span>' +
                '<span>' + (catNames[news.cat] || news.cat) + '</span>';

            var detailHtml = '';
            if (news.details) {
                for (var i = 0; i < news.details.length; i++) {
                    var d = news.details[i];
                    detailHtml += '<div class="detail-block"><div class="label">' +
                        d.label + '</div><div class="content">' +
                        d.content + '</div></div>';
                }
            }
            document.getElementById('detail-content').innerHTML = detailHtml;

            if (news.url && news.url !== '#') {
                document.getElementById('detail-link').innerHTML =
                    '<a href="' + news.url + '" target="_blank" rel="noopener">查看原文 →</a>';
            } else {
                document.getElementById('detail-link').innerHTML = '';
            }

            document.getElementById('detail-insight').textContent =
                news.insight || '持续关注该领域最新动态。';

            var related = [];
            for (var k in newsData) {
                if (parseInt(k) !== id && newsData[k].cat === news.cat) {
                    related.push(k);
                }
            }
            related = related.slice(0, 5);
            var relHtml = '';
            for (var r = 0; r < related.length; r++) {
                var rk = related[r];
                relHtml += '<div class="related-item" onclick="location.href=\'news_detail.html?n=' +
                    rk + '\'">' + newsData[rk].title + '</div>';
            }
            document.getElementById('related-list').innerHTML =
                relHtml || '<div style="color:var(--text-muted);font-size:14px;">暂无同类新闻</div>';
        }

        render();
    </script>
</body>
</html>
