<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 — 每日新闻速递</title>
    <style>
        :root {
            --bg: #f4f2ef;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #888;
            --border: #e8e4df;
            --summary-bg: #1e1b18;
            --tag-bg: #f0ede9;
            --tag-text: #5c554d;
            --accent: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 768px; margin: 0 auto; padding: 32px 20px 60px; }

        .back-row {
            margin-bottom: 24px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color .2s ease;
        }
        .back-link:hover { color: var(--text); }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 36px 32px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
            margin-bottom: 24px;
        }
        .card .title {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 16px;
        }
        .card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .card .meta span {
            font-size: 13px;
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 4px 12px;
            border-radius: 4px;
        }
        .card .meta .source { font-weight: 600; }

        .detail-block {
            margin-bottom: 16px;
        }
        .detail-block .label {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-block .label::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
        }
        .detail-block .content {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.75;
            padding-left: 11px;
        }

        .original-link {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .original-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .original-link a:hover { text-decoration: underline; }

        .insight-card {
            background: var(--summary-bg);
            border-radius: 12px;
            padding: 28px 30px;
            color: #e0dbd4;
            margin-bottom: 24px;
        }
        .insight-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: #dba959;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .insight-card p {
            font-size: 14px;
            line-height: 1.85;
            color: #c4bbb0;
        }

        .related-card {
            background: var(--card);
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
        }
        .related-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .related-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all .2s ease;
        }
        .related-item:last-child { border-bottom: none; }
        .related-item:hover { color: var(--accent); padding-left: 6px; }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .card { padding: 24px 20px; }
            .card .title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-row">
            <a href="daily_news.html" class="back-link">← 返回新闻列表</a>
        </div>

        <div class="card">
            <h1 class="title" id="detail-title">加载中...</h1>
            <div class="meta" id="detail-meta"></div>
            <div id="detail-content"></div>
            <div class="original-link" id="detail-link"></div>
        </div>

        <div class="insight-card">
            <h3>新闻启示</h3>
            <p id="detail-insight"></p>
        </div>

        <div class="related-card">
            <h3>同类新闻</h3>
            <div id="related-list"></div>
        </div>

        <div class="footer">
            <p>每日新闻速递 &nbsp;·&nbsp; 数据来源：主流新闻媒体</p>
        </div>
    </div>

    <script>
        var newsData = {
            1: {title: '爱尔眼科大额补税', source: '新浪财经', url: 'https://finance.sina.com.cn/zt_d/subject-1779339744', cat: 'economy', details: [{"label": "核心数据", "content": "\"爱尔眼科大额补税\"所涉及的核心指标显示出积极变化，为行业研判提供重要参考。"}, {"label": "核心计划", "content": "\"爱尔眼科大额补税\"所披露的规划蓝图展现出长远战略视野和清晰实施路径。"}], insight: '经济数据折射市场脉动，政策信号影响资本流向与产业布局。'},
            2: {title: '证监会严肃查处老虎富途长桥', source: '新浪财经', url: 'https://finance.sina.com.cn/zt_d/zjhyclhftcqffkjzyaj', cat: 'economy', details: [{"label": "市场反应", "content": "受\"证监会严肃查处老虎富途长桥\"消息影响，市场参与者正在重新评估相关板块的估值与前景。"}, {"label": "核心计划", "content": "\"证监会严肃查处老虎富途长桥\"所披露的规划蓝图展现出长远战略视野和清晰实施路径。"}], insight: '经济数据折射市场脉动，政策信号影响资本流向与产业布局。'},
            3: {title: '新浪财经芝麻AI', source: '新浪财经', url: 'https://ai.finance.sina.cn?symbol=pcsy', cat: 'economy', details: [{"label": "核心计划", "content": "\"新浪财经芝麻AI\"所披露的规划蓝图展现出长远战略视野和清晰实施路径。"}, {"label": "核心数据", "content": "\"新浪财经芝麻AI\"所涉及的核心指标显示出积极变化，为行业研判提供重要参考。"}], insight: '经济数据折射市场脉动，政策信号影响资本流向与产业布局。'},
            4: {title: '今日主角 | “敬二舅”刷屏：平凡之光，大有力量', source: '新华网', url: 'http://www.news.cn/comments/20220728/b8859a78ad1743aeba8fdeadff3651bb/c.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"今日主角 | “敬二舅”刷屏：平凡之光，大有力量\"方面取得了阶段性重要突破，为后续发展奠定了坚实基础。"}, {"label": "紧张态势", "content": "\"今日主角 | “敬二舅”刷屏：平凡之光，大有力量\"反映出当前局势的复杂性与紧迫性，各方态度值得密切关注。"}], insight: '国际政治博弈牵动全球格局，外交动向与经济利益深度交织。'},
            5: {title: '如何理解文化自信的这一根本性意义？', source: '新华网', url: 'http://www.xinhuanet.com/comments/20220604/1f747dd82f284b56849e5d5302d84f22/c.html', cat: 'politics', details: [{"label": "紧张态势", "content": "\"如何理解文化自信的这一根本性意义？\"反映出当前局势的复杂性与紧迫性，各方态度值得密切关注。"}, {"label": "重要成果", "content": "在\"如何理解文化自信的这一根本性意义？\"方面取得了阶段性重要突破，为后续发展奠定了坚实基础。"}], insight: '国际政治博弈牵动全球格局，外交动向与经济利益深度交织。'},
            6: {title: '新时代中国发展进步的成功之道', source: '新华网', url: 'http://www.news.cn/comments/20220507/633c2f34e0744bddac65f88387f168f8/c.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"新时代中国发展进步的成功之道\"方面取得了阶段性重要突破，为后续发展奠定了坚实基础。"}, {"label": "紧张态势", "content": "\"新时代中国发展进步的成功之道\"反映出当前局势的复杂性与紧迫性，各方态度值得密切关注。"}], insight: '国际政治博弈牵动全球格局，外交动向与经济利益深度交织。'},
            7: {title: '开局起步“十五五”系列主题新闻发布会', source: '新华网', url: 'https://www.news.cn/zt/swwxlztfbh/index.html', cat: 'politics', details: [{"label": "核心内容", "content": "围绕\"开局起步“十五五”系列主题新闻发布会\"这一主题，各方正在积极推进相关工作，引发业界广泛关注。"}, {"label": "重要成果", "content": "在\"开局起步“十五五”系列主题新闻发布会\"方面取得了阶段性重要突破，为后续发展奠定了坚实基础。"}], insight: '国际政治博弈牵动全球格局，外交动向与经济利益深度交织。'},
            8: {title: '“清清黄河”行进式报道', source: '新华网', url: 'https://www.news.cn/specials.html', cat: 'politics', details: [{"label": "核心内容", "content": "围绕\"“清清黄河”行进式报道\"这一主题，各方正在积极推进相关工作，引发业界广泛关注。"}, {"label": "重要成果", "content": "在\"“清清黄河”行进式报道\"方面取得了阶段性重要突破，为后续发展奠定了坚实基础。"}], insight: '国际政治博弈牵动全球格局，外交动向与经济利益深度交织。'}
            0: {title: '示例', source: '来源', url: '#', cat: 'tech',
                 details: [{label:'核心内容',content:'示例内容'}],
                 insight: '示例洞察'}
        };

        var catNames = {
            tech: '科技', economy: '经济', politics: '政治',
            humanities: '人文', military: '军事'
        };

        function getNewsId() {
            var p = new URLSearchParams(window.location.search);
            var id = p.get('n') || p.get('news');
            return id ? parseInt(id) : 1;
        }

        function render() {
            var id = getNewsId();
            var news = newsData[id];
            if (!news) {
                document.getElementById('detail-title').textContent = '新闻未找到';
                return;
            }

            document.getElementById('detail-title').textContent = news.title;
            document.getElementById('detail-meta').innerHTML =
                '<span class="source">' + news.source + '</span>' +
                '<span>' + (catNames[news.cat] || news.cat) + '</span>';

            var detailHtml = '';
            if (news.details) {
                for (var i = 0; i < news.details.length; i++) {
                    var d = news.details[i];
                    detailHtml += '<div class="detail-block"><div class="label">' +
                        d.label + '</div><div class="content">' +
                        d.content + '</div></div>';
                }
            }
            document.getElementById('detail-content').innerHTML = detailHtml;

            if (news.url && news.url !== '#') {
                document.getElementById('detail-link').innerHTML =
                    '<a href="' + news.url + '" target="_blank" rel="noopener">查看原文 →</a>';
            } else {
                document.getElementById('detail-link').innerHTML = '';
            }

            document.getElementById('detail-insight').textContent =
                news.insight || '持续关注该领域最新动态。';

            var related = [];
            for (var k in newsData) {
                if (parseInt(k) !== id && newsData[k].cat === news.cat) {
                    related.push(k);
                }
            }
            related = related.slice(0, 5);
            var relHtml = '';
            for (var r = 0; r < related.length; r++) {
                var rk = related[r];
                relHtml += '<div class="related-item" onclick="location.href=\'news_detail.html?n=' +
                    rk + '\'">' + newsData[rk].title + '</div>';
            }
            document.getElementById('related-list').innerHTML =
                relHtml || '<div style="color:var(--text-muted);font-size:14px;">暂无同类新闻</div>';
        }

        render();
    </script>
</body>
</html>
