<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 — 每日新闻速递</title>
    <style>
        :root {
            --bg: #f6f5f3;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8c8c8c;
            --border: #e6e3dd;
            --summary-bg: #1e1b18;
            --accent: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 22px;
            font-weight: 500;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text); }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 34px 30px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .card .title {
            font-size: 23px;
            font-weight: 800;
            line-height: 1.45;
            color: var(--text);
            margin-bottom: 14px;
        }
        .card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        .card .meta span {
            font-size: 13px;
            background: #f0eeea;
            color: #5c554d;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .detail-block {
            margin-bottom: 16px;
        }
        .detail-block .dlbl {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .detail-block .dlbl::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .detail-block .dctn {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
            padding-left: 13px;
        }

        .original-link {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .original-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .original-link a:hover { text-decoration: underline; }

        .detail-overview {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.9;
            padding: 16px 20px;
            background: #faf9f7;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            margin-bottom: 22px;
        }

        .insight-card {
            background: var(--summary-bg);
            border-radius: 12px;
            padding: 26px 30px;
            color: #dcd6cc;
            margin-bottom: 20px;
        }
        .insight-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: #dba959;
            margin-bottom: 10px;
        }
        .insight-card p {
            font-size: 14px;
            line-height: 1.9;
            color: #bfb5a6;
        }

        .related-card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px 30px;
            border: 1px solid var(--border);
        }
        .related-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .related-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all .2s;
        }
        .related-item:last-child { border-bottom: none; }
        .related-item:hover { color: var(--accent); padding-left: 6px; }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .card { padding: 22px 18px; }
            .card .title { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="daily-news.html" class="back-link">← 返回新闻列表</a>

        <div class="card">
            <h1 class="title" id="detail-title">加载中...</h1>
            <div class="meta" id="detail-meta"></div>
            <div class="detail-overview" id="detail-overview"></div>
            <div id="detail-content"></div>
            <div class="original-link" id="detail-link"></div>
        </div>

        <div class="insight-card">
            <h3>新闻启示</h3>
            <p id="detail-insight"></p>
        </div>

        <div class="related-card">
            <h3>同类新闻</h3>
            <div id="related-list"></div>
        </div>

        <div class="footer">
            每日新闻速递 &nbsp;·&nbsp; 信息来源：主流新闻媒体
        </div>
    </div>

    <script>
        var newsData = {

        3: {title: "如何理解文化自信的这一根本性意义？", source: "新华网", url: "http://www.xinhuanet.com/comments/20220604/1f747dd82f284b56849e5d5302d84f22/c.html", cat: "politics", overview: "《理学院》之【100秒漫谈斯理】系列之104：。《中共中央关于党的百年奋斗重大成就和历史经验的决议》指出，“文化自信是更基础、更广泛、更深厚的自信，是一个国家、一个民族发展中最基本、最深沉、最持久的力量”。这深刻揭示了文化自信对一个国家、一个民族发展所具有的根本性意义。", details: [{"label": "政策要点", "content": "《中共中央关于党的百年奋斗重大成就和历史经验的决议》指出，“文化自信是更基础、更广泛、更深厚的自信，是一个国家、一个民族发展中最基本、最深沉、最持久的力量”。"}, {"label": "重要成果", "content": "《中共中央关于党的百年奋斗重大成就和历史经验的决议》指出，“文化自信是更基础、更广泛、更深厚的自信，是一个国家、一个民族发展中最基本、最深沉、最持久的力量”。"}], insight: "“如何理解文化自信的这一根本性意义？”背后的深层逻辑是出现值得关注的变化。对于相关各方来说，这意味着战略环境或制度框架正在发生调整。展望后续，该事件的后续发展，其连锁效应值得密切关注。"},
        4: {title: "今日主角 | “敬二舅”刷屏：平凡之光，大有力量", source: "新华网", url: "http://www.news.cn/comments/20220728/b8859a78ad1743aeba8fdeadff3651bb/c.html", cat: "politics", overview: "每个人都是生活的主角，每个人都是时代的主角。今天我们关注的主角是他们——排除万难勇向前的人。这两天，一则名为《回村三天，二舅治好了我的精神内耗》的短视频火爆网络，与“二舅”有关的话题霸占各大热搜榜。", details: [{"label": "国际反应", "content": "今天我们关注的主角是他们——排除万难勇向前的人。"}, {"label": "政策要点", "content": "这两天，一则名为《回村三天，二舅治好了我的精神内耗》的短视频火爆网络，与“二舅”有关的话题霸占各大热搜榜。"}], insight: "“今日主角 | “敬二舅”刷屏：平凡之光，大有力量”背后的深层逻辑是社会共识凝聚。对于普通消费者和居民来说，这意味着战略环境或制度框架正在发生调整。展望后续，该事件的后续发展，其连锁效应值得密切关注。"},
        5: {title: "新时代中国发展进步的成功之道", source: "新华网", url: "http://www.news.cn/comments/20220507/633c2f34e0744bddac65f88387f168f8/c.html", cat: "politics", overview: "《理学院》之【100秒漫谈斯理】系列之103：。党的十八大以来，以习近平同志为核心的党中央科学判断经济形势，提出以“创新、协调、绿色、开放、共享”为主要内容的新发展理念。今年全国两会期间，习近平总书记强调“贯彻新发展理念是新时代我国发展壮大的必由之路”，深刻揭示了新时代中国发展进步的成功之道。", details: [{"label": "趋势研判", "content": "党的十八大以来，以习近平同志为核心的党中央科学判断经济形势，提出以“创新、协调、绿色、开放、共享”为主要内容的新发展理念。"}, {"label": "政策要点", "content": "党的十八大以来，以习近平同志为核心的党中央科学判断经济形势，提出以“创新、协调、绿色、开放、共享”为主要内容的新发展理念。"}], insight: "“新时代中国发展进步的成功之道”背后的深层逻辑是出现值得关注的变化。对于科技从业者和研发机构来说，这意味着战略环境或制度框架正在发生调整。展望后续，该事件的后续发展，其连锁效应值得密切关注。"},
        6: {title: "开局起步“十五五”系列主题新闻发布会", source: "新华网", url: "https://www.news.cn/zt/swwxlztfbh/index.html", cat: "politics", overview: "4月28日，国务院新闻办公室举行“开局起步‘十五五’”系列主题新闻发布会，介绍加快推进气象高质量发展、高质效服务国家服务人民、保障经济社会发展有关情况。中国气象局局长陈振林表示，“十五五”时期将推动气象服务覆盖产业全链条。中国气象局局长陈振林介绍，“十五五”时期，气象部门有一个总的目标，就是到2030年，力争在气象关键领域取得重要突破。", details: [{"label": "重要成果", "content": "中国气象局局长陈振林介绍，“十五五”时期，气象部门有一个总的目标，就是到2030年，力争在气象关键领域取得重要突破。"}, {"label": "国际反应", "content": "中国气象局局长陈振林表示，“十五五”时期将推动气象服务覆盖产业全链条。"}], insight: "“开局起步“十五五”系列主题新闻发布会”背后的深层逻辑是民生持续改善。对于相关行业和企业来说，这意味着战略环境或制度框架正在发生调整。展望后续，该事件的后续发展，其连锁效应值得密切关注。"},
        7: {title: "“清清黄河”行进式报道", source: "新华网", url: "https://www.news.cn/specials.html", cat: "politics", overview: "", details: [{"label": "新闻概述", "content": "点击查看原文了解详情。"}], insight: "““清清黄河”行进式报道”背后的深层逻辑是出现值得关注的变化。对于相关各方来说，这意味着战略环境或制度框架正在发生调整。展望后续，该事件的后续发展，其连锁效应值得密切关注。"}
    };

        var catNames = {
            tech: '科技', economy: '经济', politics: '政治',
            humanities: '人文', military: '军事'
        };

        (function () {
            var p = new URLSearchParams(window.location.search);
            var id = parseInt(p.get('n') || p.get('news') || '1');
            var news = newsData[id];

            if (!news) {
                document.getElementById('detail-title').textContent = '新闻未找到';
                return;
            }

            document.getElementById('detail-title').textContent = news.title;
            document.getElementById('detail-meta').innerHTML =
                '<span>' + news.source + '</span>' +
                '<span>' + (catNames[news.cat] || news.cat) + '</span>';

            if (news.overview) {
                document.getElementById('detail-overview').innerHTML = news.overview;
            } else {
                document.getElementById('detail-overview').style.display = 'none';
            }

            var html = '';
            if (news.details) {
                for (var i = 0; i < news.details.length; i++) {
                    var d = news.details[i];
                    html += '<div class="detail-block"><div class="dlbl">' + d.label +
                        '</div><div class="dctn">' + d.content + '</div></div>';
                }
            }
            document.getElementById('detail-content').innerHTML = html;

            if (news.url && news.url !== '#') {
                document.getElementById('detail-link').innerHTML =
                    '<a href="' + news.url + '" target="_blank" rel="noopener">查看原文 →</a>';
            }

            document.getElementById('detail-insight').textContent =
                news.insight || '持续关注该领域最新动态。';

            var related = [];
            for (var k in newsData) {
                if (parseInt(k) !== id && newsData[k].cat === news.cat) {
                    related.push(k);
                }
            }
            related = related.slice(0, 5);
            var relHtml = '';
            for (var r = 0; r < related.length; r++) {
                var rk = related[r];
                relHtml += '<div class="related-item" onclick="location.href=\'news-detail.html?n=' +
                    rk + '\'">' + newsData[rk].title + '</div>';
            }
            document.getElementById('related-list').innerHTML =
                relHtml || '<div style="color:var(--text-muted);font-size:14px;">暂无同类新闻</div>';
        })();
    </script>
</body>
</html>
