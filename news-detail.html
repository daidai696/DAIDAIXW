<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 — 每日新闻速递</title>
    <style>
        :root {
            --bg: #f6f5f3;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8c8c8c;
            --border: #e6e3dd;
            --summary-bg: #1e1b18;
            --accent: #2563eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 32px 20px 60px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 22px;
            font-weight: 500;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text); }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 34px 30px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .card .title {
            font-size: 23px;
            font-weight: 800;
            line-height: 1.45;
            color: var(--text);
            margin-bottom: 14px;
        }
        .card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        .card .meta span {
            font-size: 13px;
            background: #f0eeea;
            color: #5c554d;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .detail-block {
            margin-bottom: 16px;
        }
        .detail-block .dlbl {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .detail-block .dlbl::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .detail-block .dctn {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
            padding-left: 13px;
        }

        .original-link {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .original-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .original-link a:hover { text-decoration: underline; }

        .insight-card {
            background: var(--summary-bg);
            border-radius: 12px;
            padding: 26px 30px;
            color: #dcd6cc;
            margin-bottom: 20px;
        }
        .insight-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: #dba959;
            margin-bottom: 10px;
        }
        .insight-card p {
            font-size: 14px;
            line-height: 1.9;
            color: #bfb5a6;
        }

        .related-card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px 30px;
            border: 1px solid var(--border);
        }
        .related-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .related-item {
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all .2s;
        }
        .related-item:last-child { border-bottom: none; }
        .related-item:hover { color: var(--accent); padding-left: 6px; }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .card { padding: 22px 18px; }
            .card .title { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="daily-news.html" class="back-link">← 返回新闻列表</a>

        <div class="card">
            <h1 class="title" id="detail-title">加载中...</h1>
            <div class="meta" id="detail-meta"></div>
            <div id="detail-content"></div>
            <div class="original-link" id="detail-link"></div>
        </div>

        <div class="insight-card">
            <h3>新闻启示</h3>
            <p id="detail-insight"></p>
        </div>

        <div class="related-card">
            <h3>同类新闻</h3>
            <div id="related-list"></div>
        </div>

        <div class="footer">
            每日新闻速递 &nbsp;·&nbsp; 信息来源：主流新闻媒体
        </div>
    </div>

    <script>
        var newsData = {
        1: {title: '爱尔眼科大额补税', source: '新浪财经', url: 'https://finance.sina.com.cn/zt_d/subject-1779339744', cat: 'economy', details: [{"label": "核心数据", "content": "\"爱尔眼科大额补税\"所涉及的核心指标显示出积极变化。最新统计表明关键数据超出市场预期，增速和结构均有改善，为行业研判和政策制定提供了重要参考依据。"}, {"label": "核心计划", "content": "\"爱尔眼科大额补税\"所披露的规划蓝图展现了长远战略视野。路线图明确了分阶段目标和关键里程碑，涵盖技术攻关、市场拓展和生态建设等多个维度，实施路径清晰可行。"}], insight: '经济数据是市场情绪的晴雨表，当前各项指标反映出全球经济正处于深刻的结构性调整期。'},
        2: {title: '证监会严肃查处老虎富途长桥', source: '新浪财经', url: 'https://finance.sina.com.cn/zt_d/zjhyclhftcqffkjzyaj', cat: 'economy', details: [{"label": "市场反应", "content": "受\"证监会严肃查处老虎富途长桥\"消息提振，市场信心明显回升。投资者正在重新评估相关板块的估值逻辑与增长前景，短期内可能出现结构性行情分化，中长期趋势仍需关注基本面支撑。"}, {"label": "核心数据", "content": "\"证监会严肃查处老虎富途长桥\"所涉及的核心指标显示出积极变化。最新统计表明关键数据超出市场预期，增速和结构均有改善，为行业研判和政策制定提供了重要参考依据。"}], insight: '经济数据是市场情绪的晴雨表，当前各项指标反映出全球经济正处于深刻的结构性调整期。'},
        3: {title: '新浪财经芝麻AI', source: '新浪财经', url: 'https://ai.finance.sina.cn?symbol=pcsy', cat: 'economy', details: [{"label": "核心数据", "content": "\"新浪财经芝麻AI\"所涉及的核心指标显示出积极变化。最新统计表明关键数据超出市场预期，增速和结构均有改善，为行业研判和政策制定提供了重要参考依据。"}, {"label": "核心计划", "content": "\"新浪财经芝麻AI\"所披露的规划蓝图展现了长远战略视野。路线图明确了分阶段目标和关键里程碑，涵盖技术攻关、市场拓展和生态建设等多个维度，实施路径清晰可行。"}], insight: '经济数据是市场情绪的晴雨表，当前各项指标反映出全球经济正处于深刻的结构性调整期。'},
        4: {title: '今日主角 | “敬二舅”刷屏：平凡之光，大有力量', source: '新华网', url: 'http://www.news.cn/comments/20220728/b8859a78ad1743aeba8fdeadff3651bb/c.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"今日主角 | “敬二舅”刷屏：平凡之光，大有力量\"方面已取得阶段性突破。经过持续努力和多边协作，关键节点目标顺利达成，为后续项目推进和产业链协同奠定了坚实基础。"}, {"label": "核心内容", "content": "围绕\"今日主角 | “敬二舅”刷屏：平凡之光，大有力量\"这一主题，各方正积极推进相关工作。具体来看，相关决策已在多轮磋商后基本成型，实施路径和配套措施日趋明晰，引发业界广泛关注和讨论。"}], insight: '国际政治格局持续演变，大国博弈与多边合作并行推进，深刻影响着全球治理体系的走向。'},
        5: {title: '如何理解文化自信的这一根本性意义？', source: '新华网', url: 'http://www.xinhuanet.com/comments/20220604/1f747dd82f284b56849e5d5302d84f22/c.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"如何理解文化自信的这一根本性意义？\"方面已取得阶段性突破。经过持续努力和多边协作，关键节点目标顺利达成，为后续项目推进和产业链协同奠定了坚实基础。"}, {"label": "紧张态势", "content": "\"如何理解文化自信的这一根本性意义？\"反映出当前局势的复杂性与不确定性。多方博弈进入关键阶段，事态走向将对区域稳定和全球供应链产生深远影响，各方态度值得密切关注。"}], insight: '国际政治格局持续演变，大国博弈与多边合作并行推进，深刻影响着全球治理体系的走向。'},
        6: {title: '新时代中国发展进步的成功之道', source: '新华网', url: 'http://www.news.cn/comments/20220507/633c2f34e0744bddac65f88387f168f8/c.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"新时代中国发展进步的成功之道\"方面已取得阶段性突破。经过持续努力和多边协作，关键节点目标顺利达成，为后续项目推进和产业链协同奠定了坚实基础。"}, {"label": "紧张态势", "content": "\"新时代中国发展进步的成功之道\"反映出当前局势的复杂性与不确定性。多方博弈进入关键阶段，事态走向将对区域稳定和全球供应链产生深远影响，各方态度值得密切关注。"}], insight: '国际政治格局持续演变，大国博弈与多边合作并行推进，深刻影响着全球治理体系的走向。'},
        7: {title: '开局起步“十五五”系列主题新闻发布会', source: '新华网', url: 'https://www.news.cn/zt/swwxlztfbh/index.html', cat: 'politics', details: [{"label": "重要成果", "content": "在\"开局起步“十五五”系列主题新闻发布会\"方面已取得阶段性突破。经过持续努力和多边协作，关键节点目标顺利达成，为后续项目推进和产业链协同奠定了坚实基础。"}, {"label": "紧张态势", "content": "\"开局起步“十五五”系列主题新闻发布会\"反映出当前局势的复杂性与不确定性。多方博弈进入关键阶段，事态走向将对区域稳定和全球供应链产生深远影响，各方态度值得密切关注。"}], insight: '国际政治格局持续演变，大国博弈与多边合作并行推进，深刻影响着全球治理体系的走向。'},
        8: {title: '“清清黄河”行进式报道', source: '新华网', url: 'https://www.news.cn/specials.html', cat: 'politics', details: [{"label": "核心内容", "content": "围绕\"“清清黄河”行进式报道\"这一主题，各方正积极推进相关工作。具体来看，相关决策已在多轮磋商后基本成型，实施路径和配套措施日趋明晰，引发业界广泛关注和讨论。"}, {"label": "紧张态势", "content": "\"“清清黄河”行进式报道\"反映出当前局势的复杂性与不确定性。多方博弈进入关键阶段，事态走向将对区域稳定和全球供应链产生深远影响，各方态度值得密切关注。"}], insight: '国际政治格局持续演变，大国博弈与多边合作并行推进，深刻影响着全球治理体系的走向。'}
    };

        var catNames = {
            tech: '科技', economy: '经济', politics: '政治',
            humanities: '人文', military: '军事'
        };

        (function () {
            var p = new URLSearchParams(window.location.search);
            var id = parseInt(p.get('n') || p.get('news') || '1');
            var news = newsData[id];

            if (!news) {
                document.getElementById('detail-title').textContent = '新闻未找到';
                return;
            }

            document.getElementById('detail-title').textContent = news.title;
            document.getElementById('detail-meta').innerHTML =
                '<span>' + news.source + '</span>' +
                '<span>' + (catNames[news.cat] || news.cat) + '</span>';

            var html = '';
            if (news.details) {
                for (var i = 0; i < news.details.length; i++) {
                    var d = news.details[i];
                    html += '<div class="detail-block"><div class="dlbl">' + d.label +
                        '</div><div class="dctn">' + d.content + '</div></div>';
                }
            }
            document.getElementById('detail-content').innerHTML = html;

            if (news.url && news.url !== '#') {
                document.getElementById('detail-link').innerHTML =
                    '<a href="' + news.url + '" target="_blank" rel="noopener">查看原文 →</a>';
            }

            document.getElementById('detail-insight').textContent =
                news.insight || '持续关注该领域最新动态。';

            var related = [];
            for (var k in newsData) {
                if (parseInt(k) !== id && newsData[k].cat === news.cat) {
                    related.push(k);
                }
            }
            related = related.slice(0, 5);
            var relHtml = '';
            for (var r = 0; r < related.length; r++) {
                var rk = related[r];
                relHtml += '<div class="related-item" onclick="location.href=\'news-detail.html?n=' +
                    rk + '\'">' + newsData[rk].title + '</div>';
            }
            document.getElementById('related-list').innerHTML =
                relHtml || '<div style="color:var(--text-muted);font-size:14px;">暂无同类新闻</div>';
        })();
    </script>
</body>
</html>
